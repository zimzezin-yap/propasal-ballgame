<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>핀볼 랜덤 경품 뽑기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <header class="topbar">
          <div>
            <p class="eyebrow">Pinball Prize Draw</p>
            <h1>핀볼 랜덤 경품 뽑기</h1>
          </div>
          <div class="status" id="statusText">고정 참가자 명단으로 추첨을 시작하세요</div>
        </header>

        <div class="machine">
          <canvas id="pinballCanvas" width="900" height="680" aria-label="핀볼 추첨판"></canvas>
          <div class="goal-labels">
            <span>왼쪽: 거치대</span>
            <span>중앙 왼쪽: USB</span>
            <span>중앙 오른쪽: C타입 허브</span>
            <span>오른쪽: 메모지</span>
          </div>
        </div>
      </section>

      <aside class="panel">
        <div class="input-group">
          <label for="nameInput">참가자 이름</label>
          <textarea id="nameInput" spellcheck="false" placeholder="고정 참가자 명단"></textarea>
        </div>

        <div class="stats">
          <div>
            <strong id="countText">0</strong>
            <span>참가자</span>
          </div>
          <div>
            <strong>25</strong>
            <span>주요 상품</span>
          </div>
        </div>

        <div class="controls">
          <button id="sampleBtn" type="button" class="secondary">예시 이름</button>
          <button id="shuffleBtn" type="button" class="secondary">섞기</button>
          <button id="startBtn" type="button" class="primary">시작</button>
          <button id="resetBtn" type="button" class="secondary">초기화</button>
        </div>

        <section class="prizes" aria-label="상품 배정">
          <h2>상품 배정</h2>
          <ul>
            <li><span class="dot stand"></span>1-15등: 거치대</li>
            <li><span class="dot usb"></span>16-20등: USB</li>
            <li><span class="dot hub"></span>21-25등: C타입 허브</li>
            <li><span class="dot memo"></span>26등부터: 메모지</li>
          </ul>
        </section>

        <p class="result-note">추첨이 모두 끝나면 결과 팝업이 자동으로 열립니다.</p>
      </aside>
    </main>

    <div class="modal-backdrop" id="resultModal" aria-hidden="true">
      <section class="result-modal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Draw Complete</p>
            <h2 id="resultTitle">추첨 결과</h2>
          </div>
          <button id="closeModalBtn" type="button" class="icon-button" aria-label="결과 팝업 닫기">×</button>
        </div>

        <div class="result-summary" id="resultSummary"></div>
        <ol id="resultList"></ol>

        <div class="modal-actions">
          <button id="copyBtn" type="button" class="secondary">결과 복사</button>
          <button id="confirmModalBtn" type="button" class="primary">확인</button>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
